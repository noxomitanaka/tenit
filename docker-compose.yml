version: '3.8'

services:
  tenit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL:-file:./data/tenit.db}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Stripe / LINE は環境変数ではなく管理画面（/dashboard/settings）で設定する。
      # アプリは clubSettings（DB）からこれらの値を読むため、ここに書いても反映されない。
    volumes:
      - tenit-data:/app/data
    restart: unless-stopped
    healthcheck:
      # node:20-alpine に curl は同梱されないため Node で疎通確認する
      # （curl 依存だと正常でも常に unhealthy になる）。
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tenit-data:
